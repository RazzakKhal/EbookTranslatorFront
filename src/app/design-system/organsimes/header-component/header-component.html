<header class="page-header">
  <div class="header-shell">
    <a class="brand" routerLink="/">
      <span class="brand__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path
            d="M12 2v8m4-4-4-4-4 4M4 16.5A2.5 2.5 0 0 1 6.5 14H7V9.5A4.5 4.5 0 0 1 11.5 5h1A4.5 4.5 0 0 1 17 9.5V14h.5A2.5 2.5 0 0 1 20 16.5v2A2.5 2.5 0 0 1 17.5 21h-11A2.5 2.5 0 0 1 4 18.5z"
          />
        </svg>
      </span>
      <span class="brand__text">EbookTranslator</span>
    </a>

    <nav class="desktop-nav" aria-label="Navigation principale">
      <a [routerLink]="['/translate']" (click)="closeMobileMenu()">Traduire un Ebook</a>
    </nav>

    <div class="desktop-actions">
      <a class="header-link-button" routerLink="/">Accueil</a>
      @if (!authenticated()) {
        <a class="header-primary-button" routerLink="/sign-up">Creer un compte</a>
      }
      <button class="header-auth-button" type="button" (click)="onAuthAction()">
        {{ authenticated() ? 'Se deconnecter' : 'Se connecter' }}
      </button>
    </div>

    <button
      #menuToggleButton
      class="menu-toggle"
      type="button"
      aria-label="Ouvrir le menu"
      aria-controls="mobile-menu"
      [attr.aria-expanded]="isMobileMenuOpen()"
      (click)="openMobileMenu()"
    >
      <svg viewBox="0 0 24 24" focusable="false">
        <path d="M4 7h16M4 12h16M4 17h16" />
      </svg>
    </button>
  </div>
</header>

@if (isMobileMenuOpen()) {
  <div
    id="mobile-menu"
    class="mobile-menu"
    role="dialog"
    aria-modal="true"
    aria-label="Menu principal"
  >
    <div class="mobile-menu__header">
      <span class="brand__text">EbookTranslator</span>
      <button
        #mobileMenuCloseButton
        class="menu-close"
        type="button"
        aria-label="Fermer le menu"
        (click)="closeMobileMenu()"
      >
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M6 6 18 18M18 6 6 18" />
        </svg>
      </button>
    </div>

    <nav class="mobile-nav" aria-label="Navigation mobile">
      <a [routerLink]="['/translate']" (click)="closeMobileMenu()">Traduire un Ebook</a>
      <a class="mobile-primary-button" routerLink="/sign-up" (click)="closeMobileMenu()">
        Creer un compte
      </a>
      <a class="mobile-secondary-button" routerLink="/" (click)="closeMobileMenu()">Accueil</a>
      <button class="mobile-auth-button" type="button" (click)="onMobileAuthAction()">
        {{ authenticated() ? 'Se deconnecter' : 'Se connecter' }}
      </button>
    </nav>
  </div>
}
